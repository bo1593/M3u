<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Boda Store | Elite Player</title>
    <!-- استدعاء المكتبات الاحترافية (CDN) -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #0a0a0a; color: #00ffcc; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .vjs-theme-city { --vjs-theme-city--primary: #00ffcc; }
        .video-js { width: 90vw; height: 50vh; border-radius: 15px; border: 2px solid #00ffcc; box-shadow: 0 0 20px #00ffcc55; }
        input { width: 80vw; padding: 15px; margin: 20px 0; background: #1a1a1a; border: 2px solid #333; color: #00ffcc; border-radius: 8px; outline: none; }
        input:focus { border-color: #00ffcc; }
        button { padding: 15px 40px; background: #00ffcc; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); box-shadow: 0 0 15px #00ffcc; }
    </style>
</head>
<body>

    <h1 style="text-shadow: 0 0 10px #00ffcc;">BODA PLAYER V1</h1>
    <input type="text" id="streamUrl" placeholder="ضع رابط m3u8 هنا يا بطل...">
    <button onclick="loadStream()">تشغيل البث</button>

    <video id="my-video" class="video-js vjs-theme-city" controls preload="auto" data-setup='{}'>
        <source src="" type="application/x-mpegURL">
    </video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        var player = videojs('my-video');
        
        function loadStream() {
            var url = document.getElementById('streamUrl').value;
            player.src({
                src: url,
                type: 'application/x-mpegURL'
            });
            player.play();
        }
    </script>
</body>
</html>
